name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Install frontend deps
        run: npm --prefix frontend install
      - name: Generate bindings
        run: wails3 generate bindings
      - name: Build frontend
        run: npm --prefix frontend run build
      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import /tmp/certificate.p12 -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm /tmp/certificate.p12
      - name: Build binary
        run: go build -tags production -trimpath -ldflags="-w -s -X main.version=${{ github.ref_name }}" -o DelveUI .
      - name: Create .app bundle and sign
        run: |
          mkdir -p DelveUI.app/Contents/MacOS
          mkdir -p DelveUI.app/Contents/Resources
          cp DelveUI DelveUI.app/Contents/MacOS/
          cp build/darwin/icons.icns DelveUI.app/Contents/Resources/
          cp build/darwin/Info.plist DelveUI.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.ref_name }}" DelveUI.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.ref_name }}" DelveUI.app/Contents/Info.plist
          codesign --force --deep --sign "Developer ID Application: Patrick Waweru (Q79K8A6H7U)" --entitlements build/darwin/entitlements.plist DelveUI.app
      - name: Create zip + DMG
        run: |
          ditto -c -k --sequesterRsrc --keepParent DelveUI.app DelveUI-macOS-${{ github.ref_name }}.zip
          hdiutil create -volname "DelveUI" -srcfolder DelveUI.app -ov -format UDZO DelveUI-macOS-${{ github.ref_name }}.dmg
      - uses: actions/upload-artifact@v5
        with:
          name: macos
          path: |
            DelveUI-macOS-*.zip
            DelveUI-macOS-*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Install frontend deps
        run: npm --prefix frontend install
      - name: Generate bindings
        run: wails3 generate bindings
      - name: Build frontend
        run: npm --prefix frontend run build
      - name: Build binary
        run: go build -tags production -trimpath -ldflags="-w -s -X main.version=${{ github.ref_name }}" -o DelveUI .
      - name: Package
        run: |
          mkdir -p DelveUI-linux
          cp DelveUI DelveUI-linux/
          cp build/appicon.png DelveUI-linux/delveui.png
          tar czf DelveUI-linux-${{ github.ref_name }}.tar.gz DelveUI-linux
      - uses: actions/upload-artifact@v5
        with:
          name: linux
          path: DelveUI-linux-*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Install frontend deps
        run: cd frontend && npm install
      - name: Generate bindings
        run: wails3 generate bindings
      - name: Build frontend
        run: cd frontend && npm run build
      - name: Build binary
        run: go build -tags production -trimpath -ldflags="-w -s -X main.version=${{ github.ref_name }}" -o DelveUI.exe .
      - name: Package
        run: Compress-Archive -Path DelveUI.exe -DestinationPath DelveUI-windows-${{ github.ref_name }}.zip
      - uses: actions/upload-artifact@v5
        with:
          name: windows
          path: DelveUI-windows-*.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - name: List artifacts
        run: ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            DelveUI-macOS-*.zip
            DelveUI-macOS-*.dmg
            DelveUI-linux-*.tar.gz
            DelveUI-windows-*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
