name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Install frontend deps
        run: npm --prefix frontend install
      - name: Generate bindings
        run: wails3 generate bindings
      - name: Build frontend
        run: npm --prefix frontend run build
      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          # Install Apple WWDR intermediate certificates (required for valid chain)
          curl -sL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer -o /tmp/DevIDG2.cer
          security import /tmp/DevIDG2.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o /tmp/WWDRG3.cer
          security import /tmp/WWDRG3.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true

          security import /tmp/certificate.p12 -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm /tmp/certificate.p12 /tmp/DevIDG2.cer /tmp/WWDRG3.cer
      - name: Build binary
        run: go build -tags production -trimpath -ldflags="-w -s -X main.version=${{ github.ref_name }}" -o DelveUI .
      - name: Create .app bundle and sign
        run: |
          mkdir -p DelveUI.app/Contents/MacOS
          mkdir -p DelveUI.app/Contents/Resources
          cp DelveUI DelveUI.app/Contents/MacOS/
          cp build/darwin/icons.icns DelveUI.app/Contents/Resources/
          cp build/darwin/Info.plist DelveUI.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.ref_name }}" DelveUI.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.ref_name }}" DelveUI.app/Contents/Info.plist
          # Try Developer ID signing; fall back to ad-hoc if cert unavailable
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/' || true)
          if [ -n "$IDENTITY" ]; then
            echo "Signing with: $IDENTITY"
            # Sign inner binary first, then the app bundle (replaces deprecated --deep).
            # --timestamp is required for notarization.
            codesign --force --sign "$IDENTITY" --options runtime --timestamp \
              --entitlements build/darwin/entitlements.plist \
              DelveUI.app/Contents/MacOS/DelveUI
            codesign --force --sign "$IDENTITY" --options runtime --timestamp \
              --entitlements build/darwin/entitlements.plist \
              DelveUI.app
            codesign --verify --strict --verbose=2 DelveUI.app
          else
            echo "No Developer ID found, using ad-hoc signing"
            codesign --force --deep --sign - --entitlements build/darwin/entitlements.plist DelveUI.app
          fi
      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_PASSWORD" ]; then
            echo "::warning::Notarization secrets missing; skipping notarization. Downloaded app will be blocked by Gatekeeper."
            exit 0
          fi
          ditto -c -k --sequesterRsrc --keepParent DelveUI.app /tmp/DelveUI-notarize.zip
          # Capture submission ID so we can fetch Apple's log on failure
          SUBMIT_OUT=$(xcrun notarytool submit /tmp/DelveUI-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait 2>&1) || NOTARIZE_FAILED=1
          echo "$SUBMIT_OUT"
          SUBMIT_ID=$(echo "$SUBMIT_OUT" | awk '/^  id: / {print $2; exit}')
          if [ -n "$NOTARIZE_FAILED" ] || echo "$SUBMIT_OUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed. Fetching Apple's log..."
            if [ -n "$SUBMIT_ID" ]; then
              xcrun notarytool log "$SUBMIT_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_PASSWORD"
            fi
            exit 1
          fi
          xcrun stapler staple DelveUI.app
          spctl -a -vvv -t execute DelveUI.app || true
          rm /tmp/DelveUI-notarize.zip
      - name: Create zip + DMG with Applications shortcut
        run: |
          ditto -c -k --sequesterRsrc --keepParent DelveUI.app DelveUI-macOS-${{ github.ref_name }}.zip

          # Create a temporary writable DMG with app + Applications alias
          hdiutil create -size 100m -volname "DelveUI" -fs HFS+ -ov /tmp/delveui-rw.dmg
          hdiutil attach /tmp/delveui-rw.dmg -mountpoint /tmp/delveui-mount
          cp -R DelveUI.app /tmp/delveui-mount/
          ln -s /Applications /tmp/delveui-mount/Applications
          hdiutil detach /tmp/delveui-mount
          hdiutil convert /tmp/delveui-rw.dmg -format UDZO -o DelveUI-macOS-${{ github.ref_name }}.dmg
          rm /tmp/delveui-rw.dmg
      - uses: actions/upload-artifact@v5
        with:
          name: macos
          path: |
            DelveUI-macOS-*.zip
            DelveUI-macOS-*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Install frontend deps
        run: npm --prefix frontend install
      - name: Generate bindings
        run: wails3 generate bindings
      - name: Build frontend
        run: npm --prefix frontend run build
      - name: Build binary
        run: go build -tags production -trimpath -ldflags="-w -s -X main.version=${{ github.ref_name }}" -o DelveUI .
      - name: Package
        run: |
          mkdir -p DelveUI-linux
          cp DelveUI DelveUI-linux/
          cp build/appicon.png DelveUI-linux/delveui.png
          tar czf DelveUI-linux-${{ github.ref_name }}.tar.gz DelveUI-linux
      - uses: actions/upload-artifact@v5
        with:
          name: linux
          path: DelveUI-linux-*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Install frontend deps
        run: cd frontend && npm install
      - name: Generate bindings
        run: wails3 generate bindings
      - name: Build frontend
        run: cd frontend && npm run build
      - name: Build binary
        run: go build -tags production -trimpath -ldflags="-w -s -X main.version=${{ github.ref_name }}" -o DelveUI.exe .
      - name: Package
        run: Compress-Archive -Path DelveUI.exe -DestinationPath DelveUI-windows-${{ github.ref_name }}.zip
      - uses: actions/upload-artifact@v5
        with:
          name: windows
          path: DelveUI-windows-*.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - name: List artifacts
        run: ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            DelveUI-macOS-*.zip
            DelveUI-macOS-*.dmg
            DelveUI-linux-*.tar.gz
            DelveUI-windows-*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
