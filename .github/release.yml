changelog:
  categories:
    - title: "🚀 Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🎨 UI/UX"
      labels:
        - ui
        - ux
        - design
    - title: "⚡ Performance"
      labels:
        - performance
    - title: "📦 Build & CI"
      labels:
        - ci
        - build
        - dependencies
    - title: "📝 Other Changes"
      labels:
        - "*"
  exclude:
    labels:
      - skip-changelog
