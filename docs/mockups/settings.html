<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="shared.css"><title>DelveUI - Settings</title>
<style>
.settings-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.45); }
.settings { position:fixed; inset:40px; max-width:900px; margin:0 auto; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-md); display:flex; overflow:hidden; box-shadow:0 24px 64px rgba(0,0,0,0.5); }
.sidebar { width:200px; background:var(--bg-subtle); border-right:1px solid var(--border); padding:12px; display:flex; flex-direction:column; gap:2px; }
.sidebar-title { font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.5px; }
.sidebar button { display:flex; align-items:center; gap:8px; background:transparent; border:0; color:var(--text-muted); padding:8px; border-radius:var(--radius-sm); font-size:12px; cursor:pointer; text-align:left; font-family:var(--font-ui); }
.sidebar button:hover { background:var(--bg-elevated); color:var(--text); }
.sidebar button.active { background:var(--accent-subtle); color:var(--text); }
.sidebar .hint { margin-left:auto; font-family:var(--font-mono); font-size:9px; color:var(--text-faint); opacity:0.5; }
.content { flex:1; overflow:auto; padding:16px 24px; }
.content h2 { font-size:14px; font-weight:600; color:var(--text); margin-bottom:16px; }
.field { margin-bottom:16px; }
.field-label { display:block; font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.theme-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:8px; margin-bottom:16px; }
.theme-card { display:flex; flex-direction:column; gap:2px; padding:8px; background:var(--bg-subtle); border:1px solid var(--border-subtle); border-radius:var(--radius-sm); text-align:left; cursor:pointer; }
.theme-card.active { border-color:var(--accent); background:var(--accent-subtle); }
.theme-badge { font-size:9px; font-weight:600; text-transform:uppercase; padding:1px 5px; border-radius:3px; width:fit-content; }
.badge-dark { background:var(--border); color:var(--text-muted); }
.badge-light { background:#e5e5e5; color:#333; }
.theme-name { font-size:12px; font-weight:500; color:var(--text); }
.theme-author { font-size:11px; color:var(--text-faint); }
</style>
</head><body>
<div class="settings-backdrop"></div>
<div class="settings">
  <div class="sidebar">
    <div class="sidebar-title">Settings</div>
    <button class="active">🎨 Appearance <span class="hint">⌘1</span></button>
    <button>💻 Terminal <span class="hint">⌘2</span></button>
    <button>📊 Panels <span class="hint">⌘3</span></button>
    <button>📄 Debug Files <span class="hint">⌘4</span></button>
    <button>⚙ General <span class="hint">⌘5</span></button>
  </div>
  <div class="content">
    <h2>Appearance</h2>
    <div class="field">
      <span class="field-label">Theme</span>
      <button class="btn outlined" style="margin-bottom:8px">⬆ Install from file</button>
    </div>
    <div class="theme-grid">
      <div class="theme-card active"><span class="theme-badge badge-dark">dark</span><span class="theme-name">One Dark</span><span class="theme-author">DelveUI</span></div>
      <div class="theme-card"><span class="theme-badge badge-light">light</span><span class="theme-name">One Light</span><span class="theme-author">DelveUI</span></div>
      <div class="theme-card"><span class="theme-badge badge-dark">dark</span><span class="theme-name">GitHub Dark</span><span class="theme-author">DelveUI</span></div>
      <div class="theme-card"><span class="theme-badge badge-light">light</span><span class="theme-name">GitHub Light</span><span class="theme-author">DelveUI</span></div>
      <div class="theme-card"><span class="theme-badge badge-dark">dark</span><span class="theme-name">Catppuccin Mocha</span><span class="theme-author">Catppuccin</span></div>
      <div class="theme-card"><span class="theme-badge badge-dark">dark</span><span class="theme-name">Dracula</span><span class="theme-author">Dracula Theme</span></div>
      <div class="theme-card"><span class="theme-badge badge-dark">dark</span><span class="theme-name">Nord</span><span class="theme-author">Arctic Ice Studio</span></div>
    </div>
    <div class="field">
      <span class="field-label">UI Font Size</span>
      <div style="display:flex;align-items:center;gap:8px"><input type="range" min="10" max="18" value="13" style="width:200px;accent-color:var(--accent)"><span style="font-family:var(--font-mono);font-size:12px;color:var(--text-faint)">13px</span></div>
    </div>
    <div class="field">
      <span class="field-label">Line Height</span>
      <div style="display:flex;gap:8px"><button class="btn outlined">compact</button><button class="btn primary">standard</button><button class="btn outlined">comfortable</button></div>
    </div>
  </div>
</div>
</body></html>
