<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="shared.css"><title>DelveUI - Welcome</title></head><body>
<div class="welcome">
  <div class="welcome-box">
    <div class="welcome-header">
      <div style="width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700">&lt;/&gt;</div>
      <div>
        <h1>Welcome to DelveUI</h1>
        <p>Delve debugger GUI for Go</p>
      </div>
    </div>

    <div class="tabs">
      <button class="active">Debug <span class="badge">4</span></button>
      <button>Run</button>
    </div>

    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;font-size:11px;color:var(--text-muted);margin-bottom:8px">
      <div style="color:var(--accent);font-weight:600">4 found</div>
    </div>

    <div class="project-path" style="display:flex;align-items:center;gap:6px">📁 ~/projects/myapi</div>
    <div class="source-row">
      <span style="font-size:16px">🟦</span>
      <span class="source-editor">VS Code</span>
      <span class="source-count">20 configs</span>
      <span class="source-imported">✓ Imported</span>
    </div>
    <div class="source-row">
      <span style="font-size:16px">🟩</span>
      <span class="source-editor">Zed</span>
      <span class="source-count">20 configs</span>
      <button class="btn primary" style="font-size:11px;height:22px">Import</button>
    </div>

    <div class="project-path" style="display:flex;align-items:center;gap:6px;margin-top:12px">📁 ~/projects/webapp</div>
    <div class="source-row">
      <span style="font-size:16px">🟦</span>
      <span class="source-editor">VS Code</span>
      <span class="source-count">3 configs</span>
      <button class="btn primary" style="font-size:11px;height:22px">Import</button>
    </div>
    <div class="source-row">
      <span style="font-size:16px">🟧</span>
      <span class="source-editor">GoLand</span>
      <span class="source-count">5 configs</span>
      <button class="btn primary" style="font-size:11px;height:22px">Import</button>
    </div>

    <div style="display:flex;gap:8px;justify-content:center;margin-top:24px">
      <button class="btn primary" style="padding:8px 20px;font-size:12px">Get Started →</button>
      <button class="btn" style="padding:8px 20px;font-size:12px;border-color:var(--border)">Skip</button>
    </div>
  </div>
</div>
</body></html>
