<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DelveUI Sessions</title>
<style>
  :root {
    /* Inlined from theme.css — no imports in public/ pages. Defaults match the
       app's active palette so the tray popup reads as part of the same app. */
    --bg:          #17191f;
    --bg-elevated: #1e2026;
    --bg-subtle:   #0f1115;
    --text:        #d8dbe1;
    --text-muted:  #8a8f99;
    --text-faint:  #5a5f69;
    --border:        #2a2d35;
    --border-subtle: #1d2026;
    --accent:        #4d9cff;
    --accent-subtle: rgba(77, 156, 255, 0.18);
    --danger:  #e06c75;
    --warning: #e5c07b;
    --success: #98c379;
    --info:    #61afef;
    --radius-sm: 4px;
    --radius-md: 6px;
    --font-ui: -apple-system, BlinkMacSystemFont, system-ui, "Inter", "IBM Plex Sans", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "IBM Plex Mono", SFMono-Regular, Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-ui);
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .head {
    display: flex; align-items: center;
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border-subtle);
    gap: 6px;
    flex-shrink: 0;
  }
  .head h1 {
    font-size: 10px; font-weight: 700; color: var(--text-faint);
    letter-spacing: 0.8px; text-transform: uppercase; flex: 1;
  }

  /* Pill buttons — matches .tb-pill in main app */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: transparent; border: 0; color: var(--text);
    padding: 0 10px; height: 24px; border-radius: var(--radius-md);
    cursor: pointer; font: inherit; font-size: 11px;
    transition: background 80ms ease;
  }
  .pill:hover { background: rgba(255, 255, 255, 0.06); }
  .pill:active { background: rgba(255, 255, 255, 0.1); }
  .pill.primary { background: var(--accent); color: #fff; }
  .pill.primary:hover { background: #5ea6ff; }
  .pill.danger { color: var(--danger); }
  .pill.danger:hover { background: rgba(224, 108, 117, 0.12); }
  .pill.icon { width: 24px; padding: 0; justify-content: center; }

  /* Body list */
  .sessions { flex: 1; overflow: auto; padding: 4px 6px; }
  .row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; cursor: pointer;
    border-radius: 5px;
    transition: background 80ms ease;
  }
  .row:hover { background: rgba(255, 255, 255, 0.04); }

  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.running  { background: var(--success); }
  .dot.stopped  { background: var(--warning); }
  .dot.starting { background: var(--info); }
  .dot.exited,
  .dot.error    { background: var(--danger); }
  .dot.idle     { background: var(--text-faint); }

  .info { flex: 1; min-width: 0; }
  .name {
    font-size: 12px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .meta {
    font-size: 10px; color: var(--text-faint);
    font-family: var(--font-mono);
  }
  .actions { display: inline-flex; gap: 2px; flex-shrink: 0; }

  .empty {
    padding: 24px 12px; text-align: center;
    color: var(--text-faint); font-size: 12px;
  }

  /* Tab bar — matches main-window Sidebar segmented control */
  .tab-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 8px;
    border-top: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .segmented {
    display: flex;
    background: var(--bg);
    border-radius: var(--radius-md);
    padding: 2px;
    gap: 1px;
  }
  .seg {
    flex: 0 0 auto;
    padding: 0 10px;
    height: 24px;
    border: 0;
    background: transparent;
    color: var(--text-faint);
    font: inherit;
    font-size: 11px;
    font-weight: 500;
    border-radius: calc(var(--radius-md) - 2px);
    cursor: pointer;
    white-space: nowrap;
    transition: background 100ms, color 100ms;
  }
  .seg:hover { color: var(--text); }
  .seg.active {
    background: var(--bg-elevated);
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }

  /* Launch section */
  .launch {
    padding: 4px 6px 6px;
    flex-shrink: 0;
    max-height: 50%;
    overflow: auto;
  }
  .launch h2 {
    font-size: 10px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.8px;
    padding: 6px 8px 4px; font-weight: 700;
  }
  .cfg {
    display: flex; align-items: center; gap: 8px; width: 100%;
    background: transparent; border: 0; color: var(--text);
    padding: 5px 8px; border-radius: 5px; cursor: pointer;
    font: inherit; font-size: 12px; text-align: left;
  }
  .cfg:hover { background: rgba(255, 255, 255, 0.04); }
  .cfg:disabled { cursor: default; opacity: 0.7; }
  .cfg:disabled:hover { background: transparent; }
  .cfg .play {
    color: var(--success);
    display: inline-flex; width: 14px; justify-content: center;
  }
  .cfg .label-main { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cfg .kind {
    font-family: var(--font-mono); font-size: 9px;
    color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  /* Tab panes */
  .pane[hidden] { display: none; }

  /* Spinner used for instant click feedback in launch buttons + sessions starting state */
  .spin {
    width: 11px; height: 11px;
    border: 1.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: tray-spin 0.8s linear infinite;
    display: inline-block;
  }
  @keyframes tray-spin { to { transform: rotate(360deg); } }

  /* Footer */
  .footer {
    display: flex; gap: 4px; padding: 6px 8px;
    border-top: 1px solid var(--border-subtle);
    justify-content: flex-end; flex-shrink: 0;
  }

  /* Minimal inline SVG icon styling */
  .i { width: 12px; height: 12px; display: inline-block; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="head">
    <h1>Sessions</h1>
    <button class="pill" id="btn-show" title="Open main window">
      <svg class="i" viewBox="0 0 24 24"><path d="M7 17L17 7M7 7h10v10"/></svg>
      Open
    </button>
  </div>

  <div class="sessions" id="sessions"></div>

  <div class="tab-bar" id="tab-bar" style="display:none">
    <div class="segmented" role="tablist">
      <button class="seg active" role="tab" aria-selected="true" data-tab="debug">Debug</button>
      <button class="seg" role="tab" aria-selected="false" data-tab="run">Run</button>
    </div>
  </div>
  <div class="launch" id="launch" style="display:none">
    <div class="pane" id="pane-debug">
      <div id="configs"></div>
    </div>
    <div class="pane" id="pane-run" style="display:none">
      <div id="targets"></div>
    </div>
  </div>

  <div class="footer">
    <button class="pill danger" id="btn-stopall">Stop All</button>
  </div>

  <script type="module">
    import { Call, Events } from "/wails/runtime.js";

    async function callService(service, method, ...args) {
      return Call.ByName(`github.com/jp/DelveUI/internal/services.${service}.${method}`, ...args);
    }
    async function callWS(method, ...args) {
      return Call.ByName(`github.com/jp/DelveUI/internal/services.WorkspaceService.${method}`, ...args);
    }
    async function callDisc(method, ...args) {
      return Call.ByName(`github.com/jp/DelveUI/internal/discovery.Service.${method}`, ...args);
    }

    const sessionsEl = document.getElementById("sessions");
    const configsEl = document.getElementById("configs");
    const targetsEl = document.getElementById("targets");
    const tabBar = document.getElementById("tab-bar");
    const launchSection = document.getElementById("launch");
    const paneDebug = document.getElementById("pane-debug");
    const paneRun = document.getElementById("pane-run");

    // Targets-launching feedback: ids the user just clicked, while the
    // backend Start/Launch call is still in flight. Cleared when the call
    // settles — at which point the launched cfg/target either appears in
    // the running-sessions list (and is filtered out of "available") or
    // the row reappears clickable on failure.
    const launching = new Set();
    // Lazy first scan: only triggered when Targets() returns empty AND a
    // workspace is open, so first tray-open after app start still surfaces
    // discovery items even if the main window's Run tab hasn't been visited.
    let triedDiscovery = false;
    let activeTab = "debug";

    // Tab switching
    tabBar.addEventListener("click", (e) => {
      const seg = e.target.closest(".seg");
      if (!seg) return;
      const tab = seg.dataset.tab;
      activeTab = tab;
      for (const s of tabBar.querySelectorAll(".seg")) {
        s.classList.toggle("active", s.dataset.tab === tab);
        s.setAttribute("aria-selected", s.dataset.tab === tab ? "true" : "false");
      }
      paneDebug.hidden = tab !== "debug";
      paneRun.hidden = tab !== "run";
    });

    const ICONS = {
      open:  '<svg class="i" viewBox="0 0 24 24"><path d="M7 17L17 7M7 7h10v10"/></svg>',
      stop:  '<svg class="i" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>',
      play:  '<svg class="i" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg>',
    };

    // Read the recency map written by the main window's recency-store. Same
    // localStorage origin, so the tray sees launches from anywhere in the app.
    function readRecency() {
      try {
        const raw = localStorage.getItem("delveui:recency:v1");
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch { return {}; }
    }
    function recencyCmp(rec, idKey) {
      return (a, b) => {
        const at = rec[a[idKey]] ?? 0;
        const bt = rec[b[idKey]] ?? 0;
        if (at !== bt) return bt - at;
        return (a.label ?? "").localeCompare(b.label ?? "", undefined, { sensitivity: "base" });
      };
    }

    async function fetchTargets(hasWorkspace) {
      let res = null;
      try { res = await callDisc("Targets"); } catch (e) { console.error("tray: DiscoveryService.Targets failed", e); }
      let targets = (res && res.targets) || [];
      if (!triedDiscovery && targets.length === 0 && hasWorkspace) {
        triedDiscovery = true;
        try {
          const refreshed = await callDisc("Refresh");
          targets = refreshed || [];
        } catch (e) { console.error("tray: DiscoveryService.Refresh failed", e); }
      }
      return targets;
    }

    function makeLaunchButton({ id, label, kind, onClick }) {
      const btn = document.createElement("button");
      btn.className = "cfg";
      const isLaunching = launching.has(id);
      const leading = isLaunching ? '<span class="spin"></span>' : `<span class="play">${ICONS.play}</span>`;
      const kindBadge = kind ? `<span class="kind">${esc(kind)}</span>` : "";
      btn.innerHTML = `${leading}<span class="label-main">${esc(label)}</span>${kindBadge}`;
      btn.disabled = isLaunching;
      btn.onclick = onClick;
      return btn;
    }

    async function refresh() {
      const rec = readRecency();

      // sessions
      let list = [];
      try { list = await callService("SessionService", "List"); } catch (e) { console.error("tray: SessionService.List failed", e); }
      // Drop dead sessions — exited or errored. Their PIDs no longer point
      // to a live process, so showing them in the tray is misleading.
      list = (list || [])
        .filter((s) => s.state !== "exited" && s.state !== "error")
        .sort(recencyCmp(rec, "cfgId"));
      sessionsEl.innerHTML = "";
      if (list.length === 0) {
        sessionsEl.innerHTML = '<div class="empty">No running sessions</div>';
      } else {
        for (const s of list) {
          const div = document.createElement("div");
          div.className = "row";
          div.dataset.open = s.id;
          const stateGlyph = s.state === "starting"
            ? '<span class="spin" style="margin-right:1px"></span>'
            : `<span class="dot ${s.state}"></span>`;
          div.innerHTML = `
            ${stateGlyph}
            <div class="info">
              <div class="name">${esc(s.label)}</div>
              <div class="meta">:${s.port} · PID ${s.pid} · ${s.state}</div>
            </div>
            <div class="actions">
              <button class="pill icon" data-open="${s.id}" title="Open in main window">${ICONS.open}</button>
              <button class="pill icon danger" data-stop="${s.id}" title="Stop">${ICONS.stop}</button>
            </div>
          `;
          sessionsEl.appendChild(div);
        }
      }

      // workspace info (used by both configs and run targets)
      let info = {};
      try { info = await callWS("Info"); } catch (e) { console.error("tray: WorkspaceService.Info failed", e); }
      const hasWorkspace = !!info.root;
      const runningCfgIds = new Set((list || []).map(s => s.cfgId));

      // debug configs (not currently running)
      const cfgs = info.configs || [];
      const availableCfgs = cfgs
        .filter(c => !runningCfgIds.has(c.id))
        .sort(recencyCmp(rec, "id"));
      configsEl.innerHTML = "";
      for (const cfg of availableCfgs) {
        configsEl.appendChild(makeLaunchButton({
          id: cfg.id,
          label: cfg.label,
          kind: cfg.mode || "",
          onClick: () => startCfg(cfg.id),
        }));
      }

      // run targets discovered inside the opened workspace folder
      const targets = await fetchTargets(hasWorkspace);
      const availableTargets = (targets || [])
        .filter(t => !runningCfgIds.has(t.id))
        .sort(recencyCmp(rec, "id"));
      targetsEl.innerHTML = "";
      for (const t of availableTargets) {
        targetsEl.appendChild(makeLaunchButton({
          id: t.id,
          label: t.label,
          kind: t.kind || "",
          onClick: () => launchTarget(t.id),
        }));
      }

      paneDebug.hidden = activeTab !== "debug";
      paneRun.hidden = activeTab !== "run";
      const hasAny = availableCfgs.length > 0 || availableTargets.length > 0;
      launchSection.style.display = hasAny ? "" : "none";
      tabBar.style.display = hasAny ? "" : "none";
    }

    async function startCfg(id) {
      launching.add(id);
      refresh();
      try {
        await callService("SessionService", "Start", id);
      } catch {} finally {
        launching.delete(id);
        refresh();
      }
    }

    async function launchTarget(id) {
      launching.add(id);
      refresh();
      try {
        await callDisc("Launch", id);
      } catch {} finally {
        launching.delete(id);
        refresh();
      }
    }

    sessionsEl.addEventListener("click", async (e) => {
      const stopBtn = e.target.closest("[data-stop]");
      if (stopBtn) {
        e.stopPropagation();
        await callService("SessionService", "Stop", stopBtn.dataset.stop);
        refresh();
        return;
      }
      const openBtn = e.target.closest("[data-open]");
      if (openBtn) {
        Events.Emit("tray:open-session", openBtn.dataset.open);
      }
    });

    document.getElementById("btn-show").onclick = () => {
      window.wails?.Window?.Show?.();
      Events.Emit("tray:open-session", "");
    };
    document.getElementById("btn-stopall").onclick = async () => {
      const list = await callService("SessionService", "List");
      for (const s of list || []) {
        await callService("SessionService", "Stop", s.id);
      }
      refresh();
    };

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    Events.On("tray:sessions-changed", refresh);
    Events.On("session:event", refresh);
    Events.On("workspace:changed", refresh);
    Events.On("discovery:targets", refresh);
    Events.On("discovery:done", refresh);

    refresh();
  </script>
</body>
</html>
